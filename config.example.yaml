# /etc/tuxpatch/config
# TuxPatch configuration — copy to /etc/tuxpatch/config and adjust.
# Restrict permissions once the LUKS key path is set:
#   chmod 600 /etc/tuxpatch/config

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  # Absolute path to the log file.  All stdout and stderr (including debug
  # output from flatpak subprocesses) is written here in addition to the
  # terminal, so cron job output is always available for inspection.
  path: /var/log/tuxpatch.log

  # If true (default), the log file is truncated at the start of each run so
  # it only contains output from the most recent run.
  # Set to false to keep a running append log across all runs.
  reset_on_run: true

# ── Connectivity ─────────────────────────────────────────────────────────────
# How to verify the machine can reach the update infrastructure before patching.
connectivity:
  # method: one of ping | tcp | http
  #   ping — ICMP echo to 'server'
  #   tcp  — TCP connect to 'server':'port'
  #   http — HTTP HEAD request to 'server' (prefix with http:// or https://)
  method: ping
  server: "updates.example.com"

  # Used only for method: tcp / http
  port: 443

  # Seconds before the check is considered failed
  timeout: 5

# ── Users ─────────────────────────────────────────────────────────────────────
# Which users get per-user (--user) flatpak updates.
users:
  # Local UID range to include (inclusive on both ends)
  uid_range: [1000, 2000]

  # AD/LDAP group names resolved via SSSD/getent.
  # Members are looked up with 'getent group <name>', then each member's home
  # dir is verified with 'getent passwd <username>'.
  # This is the recommended way to include AD users whose UIDs fall outside
  # uid_range (e.g. domain SID-derived UIDs in the hundreds of millions).
  # Leave empty ([]) to disable group-based inclusion.
  sssd_groups:
    - "domain users"
    - "workstation-users"

# ── Flatpak ───────────────────────────────────────────────────────────────────
flatpak:  # Set to false to skip all flatpak updates (system and per-user).
  # Default is true even when this key is absent.
  enabled: true
  # Run /usr/bin/flat-manager-checkin after flatpak updates, if it exists.
  flat_manager_checkin: true

# ── TPM2 / LUKS Reseal ───────────────────────────────────────────────────────
# When any RPM package is updated, PCR measurements may change on the next
# boot (especially shim, GRUB, or kernel updates affect PCR7).  The existing
# clevis/TPM2 binding — sealed against the old measurements — would then fail
# to unseal the LUKS volume, forcing the user to type the LUKS passphrase.
#
# tuxpatch handles this automatically using a two-boot strategy:
#
#   Pre-update  : All clevis bindings are switched from PCR-protected to
#                 TPM-only (no PCR restrictions).  The disk will still
#                 unlock automatically on the next boot via the TPM —
#                 no passphrase required — even if PCR values changed.
#
#   Post-update : A one-shot systemd service runs early in the *next* boot.
#                 It rebinds clevis against the fresh (post-update) PCR
#                 measurements using the luks_password_file to authorise
#                 the key-slot change, then reboots one final time so the
#                 system boots with full PCR protection restored.
#
# Net effect: users never see a LUKS password prompt after updates.
# The brief window of reduced protection (TPM without PCR — one boot) is
# comparable to the security model of not using PCRs at all, and is
# significantly shorter-lived.
tpm_reseal:
  # Set to false to skip the whole reseal workflow.
  enabled: false

  # Absolute path to a file containing the LUKS passphrase (binary or text).
  # This file must be readable only by root (chmod 600, chown root:root).
  # It is used to authorise clevis rebinding (adding/removing LUKS key slots)
  # both before and after the update — it is never embedded into the initrd.
  luks_password_file: "/etc/tuxpatch/luks.key"

  # TPM2 PCR banks to seal the volume against after the update.
  # Default is [7] — Secure Boot state (changes on shim/grub updates).
  #
  # Common PCR values:
  #   0  — Core BIOS / UEFI firmware code
  #   1  — BIOS / UEFI configuration data
  #   4  — Boot Manager (shim / GRUB EFI binary hash)
  #   5  — Boot Manager configuration (GPT partition table)
  #   7  — Secure Boot policy (DB, DBX, shim vendor cert)  ← recommended
  #   8  — Kernel cmdline as measured by GRUB
  #   9  — Initrd / kernel image content hash
  #   11 — Unified Kernel Image (UKI) or BitLocker-compatible
  pcr_ids: [7]

  # When true, the reseal workflow only triggers when a package listed in
  # RESEAL_TRIGGERS (kernel, shim, grub2, …) is updated, because those are
  # the packages known to change PCR7 measurements.
  # When false (default), the reseal runs on every RPM update as a safety
  # net against packages that might indirectly affect PCR values.
  # Default is false even when this key is absent.
  reseal_on_trigger_only: false

  # TPM2 backend to use when no existing binding is found on a device.
  #
  #   auto         — detect clevis or systemd-cryptenroll from existing slots;
  #                  enrol with systemd-cryptenroll when neither is found (default)
  #   cryptenroll  — always use systemd-cryptenroll for new enrolments
  #   clevis       — always use clevis for new enrolments
  #
  # Existing bindings are always handled by whichever tool created them,
  # regardless of this setting.
  backend: auto

# ── Notifications ─────────────────────────────────────────────────────────────
# Desktop notifications are delivered via org.freedesktop.Notifications (D-Bus)
# directly to each user's session bus at /run/user/<uid>/bus.
# Notifications are sent only to users who have an active graphical session
# (i.e. the socket exists).  Works on both KDE and GNOME.
# All notifications are persistent (urgency=critical, no auto-dismiss).
notifications:  # Set to false to disable all desktop notifications.
  # Default is true even when this key is absent.
  enabled: true  # RPM package names whose update triggers the "system configuration" notice.
  # Add any packages here that apply site-specific configuration.
  # If one of these packages is updated in a tuxpatch run, tuxpatch executes
  # /usr/share/<packagename>/post-install.sh after dnf upgrade and before
  # sending msg_migrate_updated notifications.
  migrate_packages:
    - tuxmigrate

  # Message for per-user flatpak updates.  {packages} is replaced with a
  # newline-separated list of updated application IDs.
  msg_flatpak_updated: "The following flatpaks have been updated:\n{packages}"

  # Message when RPM packages were updated (generic — sent when neither of
  # the two conditions below apply).
  msg_rpm_updated: "The system has been updated"

  # Message when a kernel package was updated.
  msg_kernel_updated: "A new system kernel has been installed, please reboot."

  # Message when a package from migrate_packages was updated.
  msg_migrate_updated: "New system configuration has been applied, the system might need a reboot for all changes to apply"

